<!DOCTYPE html>
<html lang="zh-CN">
<head>

      margin-bottom: 20px;

      gap: 8px;
      align-items: center;
    }

      color: #5e4630;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      background: #fefaf5;
    }

      background: #b48c5c;
      color: white;
      border-color: #8b6842;
      box-shadow: 0 4px 8px rgba(160,110,50,0.25);

      background: #e5d3bb;
      border-color: #b2906a;
    }
    .input-field {
      padding: 8px 14px;
      border: 1px solid #cfb595;
      border-radius: 24px;
      font-size: 0.9rem;
      width: 80px;
      text-align: center;
      background: white;
      color: #3e2e1f;
    }
    .action-btn {
      background: #d8bc8c;
      border: none;
      color: #3d2b16;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.2s;
      background: #e7cfaa;
      border: 1px solid #bb9b70;
      white-space: nowrap;
    }

      background: #d2b07e;
      border-color: #8f6e47;
    }
    .danger-btn {
      background: #f4e1e1;
      border-color: #cc9b9b;
      color: #633;
    }
    .danger-btn:hover {
      background: #e7c9c9;
    }
    .question-card {
      background: #ffffff;
      border: 2px solid #e6d7c0;
      border-radius: 28px;
      padding: 24px 25px;
      margin-bottom: 20px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.04);

      background: #dcc8a8;
      color: #4e3620;
      padding: 2px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 12px;
    }
    .question-num {
      font-size: 0.95rem;
      color: #8b7355;
      margin-bottom: 8px;
      font-weight: 500;
    }

      font-size: 1.3rem;
      line-height: 1.6;
      color: #2c2416;
      margin-bottom: 24px;
      font-weight: 500;
      word-break: break-word;
    }
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }
    .option-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      border: 1.5px solid #e0cdb2;
      border-radius: 18px;
      background: #fdfaf5;
      cursor: pointer;
      transition: all 0.2s ease;

      background: #f5eddf;
      border-color: #c6a77a;
    }

      width: 1.2rem;
      height: 1.2rem;
      margin: 0;
      cursor: pointer;

      background: #ffe9e9;
      border-color: #d66;
      color: #b33;
    }
    .option-item.selected-correct {
      background: #e4f3e0;
      border-color: #4caf50;
      color: #2e6b2e;
    }

      background: #e1f5e8;
      border-color: #388e3c;
      color: #1f4f1f;
      font-weight: 500;
    }

      margin-top: 14px;
      font-weight: 600;
      font-size: 1rem;
      min-height: 26px;
    }

      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }
    .nav-btn {
      background: #f2e5d5;
      border: 1px solid #c7ad8b;
      color: #4e3a27;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.95rem;

      background: #f7efe2;
      min-width: 80px;

    .nav-btn:hover {
      background: #e3cfb2;
    }
    .nav-btn:disabled {
      opacity: 0.45;
      pointer-events: none;
      background: #eee5d8;
    }

      background: #f5ede1;
      border-radius: 24px;
      padding: 12px 20px;

      color: white;

      border-radius: 20px;

</head>
<body>
<div class="app-container">
  <h1>📖 中国近现代史纲要</h1>

  <div class="control-panel">
    <div class="mode-group">
      <button class="mode-btn active" data-mode="sequential">📋 顺序</button>
      <button class="mode-btn" data-mode="random">🎲 随机</button>
      <button class="mode-btn" data-mode="unanswered">🆕 未做</button>
      <button class="mode-btn" data-mode="wrongbook">📕 错题本</button>
      <button class="mode-btn" data-mode="from">🔢 从题号</button>
    </div>
    <input type="number" id="paramInput" class="input-field" placeholder="数量/题号" value="5" min="1">
    <button id="applyModeBtn" class="action-btn">✅ 应用</button>
    <button id="resetProgressBtn" class="action-btn danger-btn">🔄 重置进度</button>
  </div>

  <div class="question-card" id="questionCard">
    <div id="chapterDisplay" class="chapter-badge" style="display:none;"></div>
    <div class="question-num" id="questionNumLabel">第 1 / 10 题</div>
    <div class="question-text" id="questionText">加载中...</div>
    <div class="options-list" id="optionsContainer"></div>
    <div class="feedback-message" id="feedbackMsg"></div>
  </div>

  <div class="nav-buttons">
    <button class="nav-btn" id="prevBtn" disabled>◀ 上一题</button>
    <button class="nav-btn" id="checkAnswerBtn">🔍 查答案</button>
    <button class="nav-btn" id="submitBtn">📥 提交</button>
    <button class="nav-btn" id="nextBtn" disabled>下一题 ▶</button>
  </div>

  <div class="stats">
    <span>📊 进度：<span id="progressText">0/0</span></span>
    <span class="badge" id="modeBadge">顺序模式</span>
    <span>❌ 错题数：<span id="wrongCount">0</span></span>
  </div>
</div>

    "chapter": "第八章",
    "id": "27",
    "question": "新中国恢复在联合国合法席位是在（ ）",
    "options": {
      "A": "1971 年",
      "B": "1978 年",
      "C": "1966 年",
      "D": "1949 年"
    },
    "answer": "A"
  }
];

    // ---------- 全局状态 ----------
    let currentMode = 'sequential';
    let currentQuestionList = [];
    let currentIndex = 0;
    let userAnswers = {};            // 记录已提交答案 { indexInBank: "A" } 使用原题库索引
    let wrongBook = new Set();       // 存储错题的题库索引
    let selectedOption = null;
    let answerRevealed = false;
    let lastSubmitCorrect = null;

    // DOM元素
    const qNumLabel = document.getElementById('questionNumLabel');
    const qText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const feedbackMsg = document.getElementById('feedbackMsg');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const checkAnswerBtn = document.getElementById('checkAnswerBtn');
    const submitBtn = document.getElementById('submitBtn');
    const applyModeBtn = document.getElementById('applyModeBtn');
    const resetProgressBtn = document.getElementById('resetProgressBtn');
    const paramInput = document.getElementById('paramInput');
    const progressText = document.getElementById('progressText');
    const modeBadge = document.getElementById('modeBadge');
    const wrongCountSpan = document.getElementById('wrongCount');
    const modeButtons = document.querySelectorAll('.mode-btn');
    const chapterDisplay = document.getElementById('chapterDisplay');

    // ---------- 存储功能 ----------
    function saveToStorage() {
      const data = {
        userAnswers: userAnswers,
        wrongBook: Array.from(wrongBook),
        currentMode: currentMode,
        currentListIndices: currentQuestionList.map(q => QUESTION_BANK.indexOf(q)),
        currentIndex: currentIndex
      };
      localStorage.setItem('modern_history_quiz_v2', JSON.stringify(data));
    }

    function loadFromStorage() {
      const raw = localStorage.getItem('modern_history_quiz_v2');
      if (!raw) return false;
      try {
        const data = JSON.parse(raw);
        userAnswers = data.userAnswers || {};
        wrongBook = new Set(data.wrongBook || []);
        currentMode = data.currentMode || 'sequential';
        const indices = data.currentListIndices || [];
        currentQuestionList = indices.map(idx => QUESTION_BANK[idx]).filter(Boolean);
        if (currentQuestionList.length === 0) currentQuestionList = [...QUESTION_BANK];
        currentIndex = (data.currentIndex !== undefined && data.currentIndex < currentQuestionList.length) ? data.currentIndex : 0;
        return true;
      } catch (e) {
        return false;
      }
    }

    function clearStorage() {
      localStorage.removeItem('modern_history_quiz_v2');
    }

    function updateWrongCountUI() {
      wrongCountSpan.textContent = wrongBook.size;
    }

    // ---------- 生成题目列表 ----------
    function generateQuestionList(mode, paramValue) {
      const all = [...QUESTION_BANK];
      if (all.length === 0) return [];
      switch (mode) {
        case 'sequential':
          return [...all];
        case 'random':
          const count = Math.min(parseInt(paramValue) || 5, all.length);
          const shuffled = [...all].sort(() => Math.random() - 0.5);
          return shuffled.slice(0, count);
        case 'unanswered':
          const unanswered = all.filter((q, idx) => !(idx in userAnswers));
          if (unanswered.length === 0) {
            alert('🎉 所有题目都已做过！');
            return [...all];
          }
          return unanswered;
        case 'wrongbook':
          const wrongList = Array.from(wrongBook).map(idx => all[idx]).filter(Boolean);
          if (wrongList.length === 0) {
            alert('📭 错题本为空');
            return [...all];
          }
          return wrongList;
        case 'from':
          let startId = parseInt(paramValue);
          if (isNaN(startId) || startId < 1) startId = 1;
          // 按原顺序从第startId题开始（索引startId-1）
          return all.slice(startId - 1);
        default:
          return [...all];
      }
    }

    function applyMode(mode, param) {
      const newList = generateQuestionList(mode, param);
      if (newList.length === 0) {
        alert('没有题目，请检查题库。');
        return;
      }
      currentMode = mode;
      currentQuestionList = newList;
      currentIndex = 0;
      selectedOption = null;
      answerRevealed = false;
      lastSubmitCorrect = null;
      renderCurrentQuestion();
      updateNavButtons();
      updateModeUI();
      saveToStorage();
    }

    function updateModeUI() {
      modeButtons.forEach(btn => {
        const btnMode = btn.getAttribute('data-mode');
        btn.classList.toggle('active', btnMode === currentMode);
      });
      const modeNames = {
        sequential: '顺序模式',
        random: '随机模式',
        unanswered: '未做题模式',
        wrongbook: '错题本模式',
        from: '从题号开始'
      };
      modeBadge.textContent = modeNames[currentMode] || currentMode;
      if (currentMode === 'random') paramInput.placeholder = '题目数量';
      else if (currentMode === 'from') paramInput.placeholder = '起始题号';
      else paramInput.placeholder = '无需参数';
    }

    // ---------- 渲染当前题目 ----------
    function renderCurrentQuestion() {
      if (!currentQuestionList.length || currentIndex >= currentQuestionList.length || currentIndex < 0) {
        qNumLabel.textContent = '无题目';
        qText.textContent = '暂无题目';
        optionsContainer.innerHTML = '';
        feedbackMsg.innerHTML = '';
        progressText.textContent = '0/0';
        chapterDisplay.style.display = 'none';
        return;
      }

      const q = currentQuestionList[currentIndex];
      const total = currentQuestionList.length;
      const bankIndex = QUESTION_BANK.indexOf(q);
      qNumLabel.textContent = `第 ${currentIndex + 1} / ${total} 题`;
      qText.textContent = q.question;
      progressText.textContent = `${currentIndex + 1}/${total}`;

      // 章节显示
      if (q.chapter) {
        chapterDisplay.style.display = 'inline-block';
        chapterDisplay.textContent = q.chapter;
      } else {
        chapterDisplay.style.display = 'none';
      }

      // 渲染选项
      const optionKeys = ['A', 'B', 'C', 'D'];
      let html = '';
      optionKeys.forEach(key => {
        if (q.options[key]) {
          html += `
            <div class="option-item" data-option="${key}">
              <input type="radio" name="questionOption" value="${key}" id="radio-${key}">
              <label for="radio-${key}" style="flex:1; cursor:pointer;"><strong>${key}.</strong> ${q.options[key]}</label>
            </div>
          `;
        }
      });
      optionsContainer.innerHTML = html;

      // 绑定选项点击事件
      document.querySelectorAll('.option-item').forEach(item => {
        item.addEventListener('click', function(e) {
          if (answerRevealed) {
            alert('本题已提交/查看答案，请切换题目。');
            return;
          }
          const radio = this.querySelector('input[type="radio"]');
          if (radio) {
            radio.checked = true;
            selectedOption = radio.value;
          }
        });
      });

      // 恢复已提交状态
      const submittedAnswer = userAnswers[bankIndex];
      if (submittedAnswer !== undefined) {
        selectedOption = submittedAnswer;
        const radioBtn = document.getElementById(`radio-${submittedAnswer}`);
        if (radioBtn) radioBtn.checked = true;
        const correctAns = q.answer;
        const isCorrect = (submittedAnswer === correctAns);
        applyOptionColors(q, submittedAnswer, true);
        answerRevealed = true;
        lastSubmitCorrect = isCorrect;
        feedbackMsg.innerHTML = isCorrect ? '✅ 回答正确！' : `❌ 回答错误。正确答案是 ${correctAns}`;
        feedbackMsg.style.color = isCorrect ? '#2e6b2e' : '#b33';
      } else {
        selectedOption = null;
        answerRevealed = false;
        lastSubmitCorrect = null;
        document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
        document.querySelectorAll('.option-item').forEach(opt => {
          opt.classList.remove('selected-wrong', 'selected-correct', 'show-correct-answer');
        });
        feedbackMsg.innerHTML = '';
      }
    }

    function applyOptionColors(question, chosenOption, isSubmitted = true) {
      const correct = question.answer;
      document.querySelectorAll('.option-item').forEach(item => {
        const optKey = item.getAttribute('data-option');
        item.classList.remove('selected-wrong', 'selected-correct', 'show-correct-answer');
        if (isSubmitted) {
          if (optKey === chosenOption && optKey === correct) {
            item.classList.add('selected-correct');
          } else if (optKey === chosenOption && optKey !== correct) {
            item.classList.add('selected-wrong');
          } else if (optKey === correct) {
            item.classList.add('show-correct-answer');
          }
        }
      });
    }

    // 提交
    function handleSubmit() {
      if (!currentQuestionList.length || currentIndex >= currentQuestionList.length) return;
      const q = currentQuestionList[currentIndex];
      if (!selectedOption) {
        alert('请先选择一个选项！');
        return;
      }
      const bankIndex = QUESTION_BANK.indexOf(q);
      const isCorrect = (selectedOption === q.answer);
      userAnswers[bankIndex] = selectedOption;
      if (isCorrect) {
        wrongBook.delete(bankIndex);
      } else {
        wrongBook.add(bankIndex);
      }
      answerRevealed = true;
      lastSubmitCorrect = isCorrect;
      applyOptionColors(q, selectedOption, true);
      feedbackMsg.innerHTML = isCorrect ? '✅ 回答正确！' : `❌ 回答错误。正确答案是 ${q.answer}`;
      feedbackMsg.style.color = isCorrect ? '#2e6b2e' : '#b33';
      updateWrongCountUI();
      saveToStorage();
      updateNavButtons();
    }

    // 查答案
    function handleCheckAnswer() {
      if (!currentQuestionList.length || currentIndex >= currentQuestionList.length) return;
      const q = currentQuestionList[currentIndex];
      const correct = q.answer;
      document.querySelectorAll('.option-item').forEach(item => {
        item.classList.remove('selected-wrong', 'selected-correct', 'show-correct-answer');
        if (item.getAttribute('data-option') === correct) {
          item.classList.add('show-correct-answer');
        }
      });
      if (selectedOption && selectedOption !== correct) {
        const wrongItem = document.querySelector(`.option-item[data-option="${selectedOption}"]`);
        if (wrongItem) wrongItem.classList.add('selected-wrong');
      }
      feedbackMsg.innerHTML = `🔎 正确答案是：${correct}`;
      feedbackMsg.style.color = '#2e6b2e';
      answerRevealed = true;
    }

    function goToPrevious() {
      if (currentIndex > 0) {
        currentIndex--;
        resetQuestionState();
        renderCurrentQuestion();
        updateNavButtons();
        saveToStorage();
      }
    }

    function goToNext() {
      if (currentIndex < currentQuestionList.length - 1) {
        currentIndex++;
        resetQuestionState();
        renderCurrentQuestion();
        updateNavButtons();
        saveToStorage();
      }
    }

    function resetQuestionState() {
      selectedOption = null;
      answerRevealed = false;
      lastSubmitCorrect = null;
    }

    function updateNavButtons() {
      prevBtn.disabled = (currentIndex === 0);
      nextBtn.disabled = (currentIndex >= currentQuestionList.length - 1);
    }

    function resetAllProgress() {
      if (confirm('确定清除所有做题记录和错题本吗？')) {
        userAnswers = {};
        wrongBook.clear();
        clearStorage();
        currentMode = 'sequential';
        currentQuestionList = [...QUESTION_BANK];
        currentIndex = 0;
        resetQuestionState();
        renderCurrentQuestion();
        updateNavButtons();
        updateModeUI();
        updateWrongCountUI();
        paramInput.value = '5';
        saveToStorage();
      }
    }

    // 事件绑定
    prevBtn.addEventListener('click', goToPrevious);
    nextBtn.addEventListener('click', goToNext);
    submitBtn.addEventListener('click', handleSubmit);
    checkAnswerBtn.addEventListener('click', handleCheckAnswer);

    applyModeBtn.addEventListener('click', () => {
      applyMode(currentMode, paramInput.value.trim());
    });

    resetProgressBtn.addEventListener('click', resetAllProgress);

    modeButtons.forEach(btn => {
      btn.addEventListener('click', function() {
        const mode = this.getAttribute('data-mode');
        if (mode === currentMode) return;
        modeButtons.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentMode = mode;
        updateModeUI();
        if (mode === 'random') paramInput.value = '5';
        else if (mode === 'from') paramInput.value = '1';
        else paramInput.value = '';
      });
    });

    // 初始化
    function initialize() {
      const hasStored = loadFromStorage();
      if (!hasStored) {
        currentMode = 'sequential';
        currentQuestionList = [...QUESTION_BANK];
        currentIndex = 0;
        userAnswers = {};
        wrongBook.clear();
        paramInput.value = '5';
      }
      if (!currentQuestionList.length) {
        currentQuestionList = [...QUESTION_BANK];
        currentIndex = 0;
      }
      if (currentIndex >= currentQuestionList.length) currentIndex = 0;
      resetQuestionState();
      renderCurrentQuestion();
      updateNavButtons();
      updateModeUI();
      updateWrongCountUI();
      if (currentMode === 'random') paramInput.value = currentQuestionList.length;
      else if (currentMode === 'from') paramInput.value = (currentQuestionList[0] ? QUESTION_BANK.indexOf(currentQuestionList[0]) + 1 : 1);
      else paramInput.value = '';
    }

    initialize();
    window.addEventListener('beforeunload', () => saveToStorage());
  })();
</script>
</body>
</html>
